# Goal - To ensure that all dependencies and packages audite for security.

name: Dependency Scan

on:
  workflow_call:

jobs:
    dependency-scan:
        runs-on: ubuntu-latest
        steps: 
            - name: checkout code
              uses: actions/checkout@v7

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: '1.25'
                go-version-file: backend
                go-cache: true
            
            - name: Install Govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest
              
            - name: Run Govulncheck
              continue-on-error: true
              run: govulncheck ./... > govelner-report.txt
              working-directory: backend/

            - name: Upload report to Artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: Job-Report
                path: reports/govelner-report.txt
                retention-days: 5


            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run Dependency Scan for NodeJs
              run: npm audit
              working-directory: frontend