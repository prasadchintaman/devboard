# Goal to ensure no secrets have been leaked in the code.
name: Secret Scanning
on:
 workflow_call:
jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
              with:
                fetch-depth: 0

            - name: GitLeaks scanner
              uses: gitleaks/gitleaks-action@v8
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}git add 
